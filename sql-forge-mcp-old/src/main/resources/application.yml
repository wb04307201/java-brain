spring:
  main:
    web-application-type: none
    banner-mode: off
  ai:
    mcp:
      server:
        name: sql-forge-mcp-server
        version: 0.0.1
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen3.5-plus
          multi_model: true
          enable_thinking: false

logging:
  pattern:
    console:
  file:
    name: ./mcp/sql-forge-mcp-server.log

# sql-forge 配置
sql-forge:
  # API 基础地址（指向 sql-forge 服务）
  api:
    url: http://localhost:8081
    executor: database
  # 数据库方言配置
  # 优先级（从高到低）：
  # 1. 数据库元数据接口自动检测：/sql/forge/api/database/getMetaDataDatabase
  # 2. 手动刷新：调用 RefreshDialect() 工具方法
  # 3. 配置文件（此配置）
  # 4. 默认值：STANDARD_SQL
  #
  # 支持的方言：MYSQL, POSTGRESQL, ORACLE, SQL_SERVER, H2, SQLITE, STANDARD_SQL
  dialect: H2
  # 模糊查询默认配置
  default:
    # 默认排序字段（用于模糊查询）
    sort-field: id
    # 默认排序方式：ASC（升序）或 DESC（降序）
    # 推荐使用 ASC，确保结果从最小ID开始，更符合直觉
    sort-direction: ASC
    # 默认查询条数限制（用于模糊查询）
    limit: 10
    # 模糊意图置信度阈值（低于此值视为模糊）
    # 0.4 以下：高度模糊，需要澄清
    # 0.4-0.7：轻微模糊，自动填充默认值
    # 0.7 以上：明确意图，直接使用
    ambiguity-threshold: 0.7
