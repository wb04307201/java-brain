spring:
  datasource:
    url: jdbc:h2:file:./.local/datasource/db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    username: sa
    password: 123456
  flyway:
    validate-on-migrate: false
  h2:
    console:
      enabled: true
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen3.7-plus
          multi_model: true
          enable_thinking: true
      embedding:
        options:
          model: text-embedding-v4
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json
    loom:
      agent:
        mcps:
          - name: spring-ai-mcp-client - bing-search
            title: 必应搜索
            description: 一个集成了微软必应搜索API的模型上下文协议服务
            default-selected: true
          - name: spring-ai-mcp-client - @tokenizin-agency/mcp-npx-fetch
            title: 网页内容抓取
            description: 一个强大的MCP服务器,可以轻松地将网页内容抓取并转换为各种格式(HTML、JSON、Markdown、纯文本)
            default-selected: true
            tools:
              - name: fetch_html
                description: 获取网页内容，并以 HTML 格式返回
              - name: fetch_markdown
                description: 取网页内容，并以 Markdown 格式返回
              - name: fetch_txt
                description: 取网页内容，并以纯文本格式返回（不含 HTML）
              - name: fetch_json
                description: 从指定 URL 获取 JSON 文件
          - name: spring-ai-mcp-client - sequential-thinking
            title: 顺序思维
            description: 一种MCP服务器实现，提供动态且反射性的解决问题的工具
            tools:
              - name: sequentialthinking
                description: 本工具通过可适应与演进的灵活思维流程，协助对问题进行深入分析
          - name: spring-ai-mcp-client - memory
            title: 记忆
            description: 使用本地知识图谱实现持久化记忆
            tools:
              - name: create_entities
                description: 在知识图谱中创建多个新实体
              - name: create_relations
                description: 在知识图谱的实体之间创建多个新关系
              - name: add_observations
                description: 向知识图谱中现有实体添加新的观察信息
              - name: delete_entities
                description: 从知识图谱中删除多个实体及其关联的关系
              - name: delete_observations
                description: 从知识图谱的实体中删除特定的观察信息
              - name: delete_relations
                description: 从知识图谱中删除多个关系
              - name: read_graph
                description: 读取整个知识图谱
              - name: search_nodes
                description: 基于查询在知识图谱中搜索节点
              - name: open_nodes
                description: 通过名称打开知识图谱中的特定节点
          - name: spring-ai-mcp-client - cn-weather-mcp
            title: 中国天气
            description: 自研中国城市实时天气服务
          - name: spring-ai-mcp-client - http-mcp
            title: HTTP 客户端
            description: HTTP客户端MCP服务，提供通用HTTP请求功能，也提供本地文件读写与下载/预览链接（listAllowedDirectories/writeFile/readFile/downloadFileUrl/viewFileUrl）
            default-selected: true
          - name: spring-ai-mcp-client - mcp-server-chart
            title: 图表生成
            description: 基于 AntV 的图表生成 MCP 服务（饼图/柱状图/折线图等），返回图片 URL
            default-selected: true
            tools:
              - name: generate_pie_chart
                description: 生成饼图，返回图片 URL（数据用 name+value 数组）
              - name: generate_column_chart
                description: 生成柱状图
              - name: generate_bar_chart
                description: 生成条形图
              - name: generate_line_chart
                description: 生成折线图
              - name: generate_area_chart
                description: 生成面积图
              - name: generate_histogram_chart
                description: 生成直方图
              - name: generate_dual_axes_chart
                description: 生成双轴对比图
              - name: generate_radar_chart
                description: 生成雷达图
              - name: generate_scatter_chart
                description: 生成散点图
          - name: spring-ai-mcp-client - sql-forge-mcp
            title: 订单系统数据库
            description: sql-forge-mcp，把 oms 订单系统的数据库元数据/CRUD/SQL/Amis模板能力暴露给 AI（执行 NL2SQL、生成 Amis CRUD 配置）
            default-selected: true
            tools:
              - name: getSystems
                description: 获取所有已注册的 sql-forge 系统（按 oms 实例返回）
              - name: sqlForgeMetaDataTables
                description: 获取某个系统下的所有表与字段元数据
              - name: getMetaDataTableInfo
                description: 获取单个表的字段类型、长度、是否可空等详细信息
              - name: executeSQL
                description: 在指定系统上执行 SELECT 查询（数据库或 Calcite 联邦），仅允许读
              - name: getMetaDataDatabase
                description: 获取指定系统下的数据库/Schema 列表
              - name: amisTemplateSave
                description: 保存 Amis 模板到 oms 并返回预览地址 http://localhost:8081/sql/forge/console?id={模板id}
          - name: spring-ai-mcp-client - playwright
            title: Playwright
            description: 通过结构化可访问性快照与网页交互
          - name: spring-ai-mcp-client - chrome-devtools
            title: Chrome DevTools
            description: 控制和检查Chrome浏览器，实现自动化操作和调试
          - name: spring-ai-mcp-client - context7
          - name: spring-ai-mcp-client - git-mcp-server
          - name: spring-ai-mcp-client - mcp-server-docker
          - name: spring-ai-mcp-client - desktop-commander
        skills:
          - name: 网络月度事件报告
            description: 用户说"梳理 xxx 月度事件/年度时间线/事件复盘/xxx 的网络事件"时触发：围绕 {topic} 按月梳理当年的重要事件，做跨月因果关联与下一年趋势预判，产出 HTML 报告并返回预览链接（{topic} 来自用户当前对话）
            content: classpath:skills/news-watch.st
          - name: http测试
            description: 用户说"测试/调用 xxx 接口/http 探测/服务连通性"时触发：自定义 http 服务测试
            content: classpath:skills/http.st
            load: false
          - name: 测试保存、下载、预览1
            description: 测试保存、下载、预览1
            content: 你能说明勾股定理么？并保存成md，并给我下载和和预览地址
            load: false
          - name: 测试保存、下载、预览2
            description: 测试保存、下载、预览2
            content: 你能说明微积分么？并保存成html，并给我下载和和预览地址
            load: false
          - name: 部署项目
            description: 用户说"部署/上线/跑起来/启动 xxx 项目"时触发：从 git 仓库拉取代码 → 编译 → 构建 Docker 镜像 → 启动容器 → 返回访问链接，支持 maven / npm / npm-frontend / pip 多栈
            content: classpath:skills/package-docker.st
          - name: 测试自动E2E功能验证
            description: 测试使用浏览器对功能进行E2E测试，并生成验证报告
            content: classpath:skills/e2e.st
          - name: 查订单系统数据
            description: 用户问订单系统里用户/会员/订单/商品/分类/字典等数据的查询、统计、排行、汇总，或要求生成图表、保存报告时触发；基于 sql-forge-mcp 的 6 个工具完成 NL2SQL
            content: classpath:skills/nl2sql.st
          - name: 创建订单系统页面
            description: 根据需要自动生成百度Amis低代码平台CRUD单表维护界面的JSON配置
            content: classpath:skills/web.st

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB