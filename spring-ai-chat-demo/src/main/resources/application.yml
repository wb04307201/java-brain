spring:
  datasource:
    url: jdbc:h2:file:./.local/datasource/db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    username: sa
    password: 123456
  flyway:
    validate-on-migrate: false
  h2:
    console:
      enabled: true
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen3.6-plus
          multi_model: true
          enable_thinking: true
      embedding:
        options:
          model: text-embedding-v2
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json
    loom:
      agent:
        mcps:
          - name: spring-ai-mcp-client - time
            title: 时间
            description:
              一个提供时间和时区转换功能的模型上下文协议服务。该服务使大型语言模型能够获取当前时间信息，并使用IANA时区名称进行时区转换，同时具备自动检测系统时区的功能。
            tools:
              - name: get_current_time
                description: 获取指定时区的当前时间
              - name: convert_time
                description: 在不同时区之间转换时间
          - name: spring-ai-mcp-client - bing-search
            title: 必应搜索
            description:
              一个集成了微软必应搜索API的模型上下文协议服务，允许人工智能助手进行网络、新闻和图片搜索。
            default-selected:  true
          - name: spring-ai-mcp-client - fetch
            title: 网页内容抓取
            description:
              该服务器使大型语言模型能够检索和处理网页内容，将HTML转换为markdown格式，以便于更轻松地使用。
            default-selected:  true
          - name: spring-ai-mcp-client - sequential-thinking
            title: 顺序思维
            description:
              一种MCP服务器实现，它通过结构化的思维过程提供了一种动态且反射性的解决问题的工具。
            tools:
              - name: sequentialthinking
                description: 本工具通过可适应与演进的灵活思维流程，协助对问题进行深入分析。随着理解的不断加深，每一步思维均可在先前的见解之上进行构建、质疑或修正。
          - name: spring-ai-mcp-client - amap-maps
            title: 高德地图
            description:
              高德地图是一个支持任何MCP协议客户端的服务，允许用户轻松利用高德地图MCP服务器获取各种基于位置的服务。
          - name: spring-ai-mcp-client - 12306-mcp
            title: 12306购票搜索
            description:
              12306购票搜索服务，允许大模型利用接口搜索12306购票信息。
          - name: spring-ai-mcp-client - mcp-server-chart
            title: 图表
            description:
              这是一个基于 TypeScript 的 MCP 服务器，提供图表生成功能。它允许您通过 MCP 工具创建各种类型的图表。
          - name: spring-ai-mcp-client - playwright
            title: Playwright
            description:
              一种模型上下文协议服务器，它使大型语言模型能够通过结构化的可访问性快照与网页交互，而无需使用视觉模型或截图。
          - name: spring-ai-mcp-client - chrome-devtools
            title: Chrome DevTools
            description:
              作为 MCP 服务，让 AI 编码助手（如 Gemini、Claude）能够控制和检查 Chrome 浏览器，实现自动化操作、调试和性能分析。
          - name: spring-ai-mcp-client - filesystem
            title: 文件系统
            description:
              用于文件系统操作的模型上下文协议（MCP）的 Node.js 服务。
          - name: spring-ai-mcp-client - memory
            title: 记忆
            description:
              一个使用本地知识图谱实现持久化记忆的基础方案。这使得 Claude 能够在不同对话之间记住关于用户的信息。
            tools:
              - name: create_entities
                description: 在知识图谱中创建多个新实体
              - name: create_relations
                description: 在知识图谱的实体之间创建多个新关系。关系应使用主动语态
              - name: add_observations
                description: 向知识图谱中现有实体添加新的观察信息
              - name: delete_entities
                description: 从知识图谱中删除多个实体及其关联的关系
              - name: delete_observations
                description: 从知识图谱的实体中删除特定的观察信息
              - name: delete_relations
                description: 从知识图谱中删除多个关系
              - name: read_graph
                description: 读取整个知识图谱
              - name: search_nodes
                description: 基于查询在知识图谱中搜索节点
              - name: open_nodes
                description: 通过名称打开知识图谱中的特定节点
          - name: spring-ai-mcp-client - cn-weather-mcp
            title: 中国天气
            description:
              一个自研中国城市实时天气服务。提供城市代码搜索与实时天气查询，允许大模型获取中国城市实时天气数据，并生成相应的天气预报。
          - name: spring-ai-mcp-client - http-client-mcp
            title: HTTP 客户端
            description:
              HTTP客户端 MCP 服务 - 提供通用HTTP请求功能（GET/POST/PUT/DELETE）
          - name: spring-ai-mcp-client - sql-forge
            title: SQL工坊
        skills:
          - name: 查询订单系统数据库
            description: 从订单系统数据库中查询用户、订单、商品、数据字典等信息
            content: classpath:skills/nl2sql.st
          - name: 创建订单系统页面
            description: 根据需要自动生成百度Amis低代码平台CRUD单表维护界面的JSON配置
            content: classpath:skills/web.st

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    org:
      springframework:
        ai: DEBUG